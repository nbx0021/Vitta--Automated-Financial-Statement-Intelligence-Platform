<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Vitta — Financial Intelligence{% endblock %}</title>
  <meta name="description" content="{% block description %}Automated financial statement analysis for NSE-listed Indian companies — powered by yfinance.{% endblock %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">
      <span class="brand-icon">V</span>
      <span class="brand-name">Vitta</span>
    </a>
    <div class="nav-tagline">Automated Financial Intelligence · NSE India</div>
    <div class="nav-right">
      <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
        Analyze
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-brand">Vitta</span>
      <span class="footer-sep">·</span>
      <span>Data source: Yahoo Finance (yfinance)</span>
      <span class="footer-sep">·</span>
      <span>For informational purposes only — not investment advice</span>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
